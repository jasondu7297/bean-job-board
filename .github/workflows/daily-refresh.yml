name: Refresh and deploy job board

on:
  workflow_dispatch:
  schedule:
    # 12:17 UTC daily. GitHub may start scheduled workflows a few minutes late.
    - cron: "17 12 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: celina-job-board-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh comprehensive job inventory
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          USAJOBS_API_KEY: ${{ secrets.USAJOBS_API_KEY }}
          USAJOBS_EMAIL: ${{ secrets.USAJOBS_EMAIL }}
          JOB_BOARD_MAX_AGE_DAYS: "120"
          JOB_BOARD_MIN_SCORE: "0"
        run: python scripts/update_jobs.py

      - name: Run tests
        run: python -m unittest discover -s tests -v

      # Persisting the generated snapshot lets tomorrow's run distinguish
      # truly net-new roles from jobs already seen on earlier refreshes.
      - name: Commit refreshed snapshot and history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/data site/standalone.html
          if ! git diff --cached --quiet; then
            git commit -m "chore: daily job refresh [skip ci]"
            git push
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
